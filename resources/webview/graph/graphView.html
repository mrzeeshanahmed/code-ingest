<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code-Ingest Graph</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      font-family: var(--vscode-font-family, "Segoe UI", sans-serif);
      color: var(--vscode-editor-foreground);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--vscode-editorInfo-foreground) 16%, transparent), transparent 35%),
        linear-gradient(180deg, var(--vscode-editor-background), color-mix(in srgb, var(--vscode-editor-background) 80%, black));
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }

    #toolbar {
      display: grid;
      grid-template-columns: auto auto auto auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--vscode-panel-border);
      background: color-mix(in srgb, var(--vscode-sideBar-background) 84%, transparent);
      backdrop-filter: blur(12px);
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--vscode-button-border, transparent);
      border-radius: 999px;
      overflow: hidden;
    }

    .segmented button,
    #toolbar button {
      border: 0;
      padding: 7px 12px;
      background: color-mix(in srgb, var(--vscode-button-secondaryBackground) 75%, transparent);
      color: var(--vscode-button-secondaryForeground);
      cursor: pointer;
    }

    .segmented button.active {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    #searchBox {
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--vscode-input-border, transparent);
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
    }

    #statsBadge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--vscode-badge-background) 80%, transparent);
      color: var(--vscode-badge-foreground);
      white-space: nowrap;
    }

    #graphNotice {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--vscode-panel-border);
      background: color-mix(in srgb, var(--vscode-editorWarning-foreground) 12%, transparent);
    }

    #graphNotice.hidden {
      display: none;
    }

    #graphNotice strong {
      display: block;
      margin-bottom: 4px;
    }

    #cy {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #tooltip,
    #contextMenu {
      position: fixed;
      z-index: 20;
      display: none;
      padding: 8px 10px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--vscode-editorWidget-background) 92%, transparent);
      border: 1px solid var(--vscode-editorWidget-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      color: var(--vscode-editorWidget-foreground);
      min-width: 200px;
    }

    #contextMenu button {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      color: inherit;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    #contextMenu button:hover {
      background: color-mix(in srgb, var(--vscode-list-hoverBackground) 80%, transparent);
    }

    .muted {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="segmented" id="layoutToggle">
      <button data-layout="cose" class="active">COSE</button>
      <button data-layout="radial">Radial</button>
    </div>
    <div class="segmented" id="modeToggle">
      <button data-mode="file" class="active">Files</button>
      <button data-mode="function">Functions</button>
    </div>
    <button id="focusButton">Focus Active</button>
    <button id="fitButton">Fit</button>
    <input id="searchBox" type="search" placeholder="Filter nodes by label or path">
    <button id="exportButton">Export PNG</button>
    <div id="statsBadge">0 nodes | 0 edges</div>
  </div>
  <div id="graphNotice" class="hidden">
    <div>
      <strong>Large graph preview</strong>
      <span id="graphNoticeText">Showing a focused subgraph for performance.</span>
    </div>
    <button id="loadFullGraphButton">Load full graph</button>
  </div>
  <div id="cy"></div>
  <div id="tooltip"></div>
  <div id="contextMenu"></div>
  <script src="../vendor/cytoscape.min.js"></script>
  <script src="../vendor/cytoscape-cose-bilkent.js"></script>
  <script src="./graphStyles.js"></script>
  <script src="./graphToolbar.js"></script>
  <script src="./graphView.js"></script>
</body>
</html>
